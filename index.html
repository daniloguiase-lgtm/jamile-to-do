<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jamile — Tarefas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --paper: #fdfaf4;
    --ink: #1a1610;
    --ink-soft: #7a7068;
    --accent: #c94a2a;
    --accent2: #2a6b5e;
    --line: #ddd6c8;
    --done-bg: #ede9e0;
    --shadow: rgba(26,22,16,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    min-height: 100vh;
    color: var(--ink);
    padding-bottom: 100px;
  }

  /* HEADER */
  .header {
    background: var(--ink);
    color: var(--bg);
    padding: 28px 20px 22px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.1;
    color: var(--bg);
  }

  .header h1 em {
    font-style: italic;
    font-weight: 400;
    color: #c8b99a;
  }

  .date-chip {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8a7e6e;
    margin-top: 4px;
  }

  .btn-new-list {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 12px;
    cursor: pointer;
    white-space: nowrap;
    margin-top: 4px;
  }

  /* PROGRESS */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-track {
    flex: 1;
    height: 2px;
    background: #3a3530;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #7ec4b5;
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 10px;
    color: #8a7e6e;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  /* MAIN MENU */
  .main-menu {
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 10px 16px 0;
    display: flex;
    justify-content: center;
  }

  .main-menu-inner {
    width: 100%;
    max-width: 600px;
    display: flex;
    gap: 6px;
  }

  .main-tab {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 12px;
    border-radius: 2px 2px 0 0;
    border: 1px solid var(--line);
    border-bottom: none;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    flex: 1;
  }

  .main-tab.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  /* LIST TABS */
  .lists-bar {
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 10px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .lists-bar::-webkit-scrollbar { display: none; }

  .list-tab {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .list-tab.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .list-tab-del {
    font-size: 12px;
    margin-left: 4px;
    opacity: 0.5;
    vertical-align: middle;
  }

  .lists-bar.hidden { display: none; }

  /* CONTENT */
  .content {
    padding: 20px 16px 0;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ADD TASK FORM */
  .add-form {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 14px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .add-form input[type="text"] {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 6px 0;
    outline: none;
    width: 100%;
  }

  .add-form input::placeholder { color: var(--ink-soft); }

  .add-form-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .cat-select {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 6px 8px;
    outline: none;
    flex: 1;
  }

  .btn-add {
    background: var(--accent2);
    color: white;
    border: none;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    white-space: nowrap;
  }

  /* SECTION */
  .section-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 18px 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* TASKS */
  .task-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-left: 3px solid transparent;
    border-radius: 2px;
    transition: all 0.15s;
    position: relative;
  }

  .task-item.done {
    background: var(--done-bg);
    border-left-color: var(--accent2);
    opacity: 0.65;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--ink-soft);
  }

  .checkbox {
    width: 17px;
    height: 17px;
    border: 1.5px solid var(--ink-soft);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }

  .task-item.done .checkbox {
    background: var(--accent2);
    border-color: var(--accent2);
  }

  .checkbox-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .task-item.done .checkbox-dot { opacity: 1; }

  .task-body {
    flex: 1;
    min-width: 0;
  }

  .task-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink);
    word-break: break-word;
    cursor: pointer;
  }

  .task-tag {
    display: inline-block;
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 2px 5px;
    border-radius: 2px;
    margin-top: 4px;
  }

  .tag-casa    { background: #ede0d4; color: #8b5e3c; }
  .tag-compras { background: #d4e8e0; color: #2a6b5e; }
  .tag-estudos { background: #d4d8ed; color: #3c4a8b; }
  .tag-pessoas { background: #edd4d4; color: #8b3c3c; }
  .tag-tarefas { background: #e8edd4; color: #5a6b2a; }
  .tag-laila   { background: #fde8f5; color: #9b3c7a; }
  .tag-outro   { background: #e8e4dc; color: #6b6358; }

  .task-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.35;
    padding: 2px;
    line-height: 1;
    transition: opacity 0.15s;
  }
  .btn-icon:hover { opacity: 0.8; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-soft);
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,22,16,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--paper);
    border-radius: 6px 6px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-bottom: 4px;
  }

  .modal input[type="text"] {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 10px 12px;
    outline: none;
    width: 100%;
  }

  .modal select {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 10px 12px;
    outline: none;
    width: 100%;
  }

  .modal-btns {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px 16px;
    cursor: pointer;
    color: var(--ink-soft);
  }

  .btn-save {
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px 16px;
    cursor: pointer;
  }

  /* NEW LIST MODAL */
  .nl-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,22,16,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .nl-modal-overlay.open { display: flex; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 26px;
    line-height: 1;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(201,74,42,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 150;
    transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.93); }
  .fab.hidden { display: none; }

  /* WEIGHT GOAL */
  .view { display: none; }
  .view.active { display: block; }

  .goal-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .goal-panel {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 14px;
  }

  .goal-panel h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    line-height: 1.15;
    margin-bottom: 12px;
  }

  .goal-form {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .field label {
    display: block;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 5px;
  }

  .field input {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 10px 12px;
    outline: none;
  }

  .field input:focus {
    border-color: var(--accent2);
  }

  .goal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 12px;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-top: 14px;
  }

  .kpi {
    border: 1px solid var(--line);
    border-left: 3px solid var(--ink-soft);
    border-radius: 2px;
    padding: 10px;
    background: var(--bg);
    min-height: 74px;
  }

  .kpi.good { border-left-color: var(--accent2); }
  .kpi.warn { border-left-color: var(--accent); }

  .kpi-label {
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .kpi-value {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    line-height: 1.1;
  }

  .kpi-note {
    font-size: 10px;
    line-height: 1.35;
    color: var(--ink-soft);
    margin-top: 5px;
  }

  .daily-entry {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    align-items: end;
  }

  .history-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 10px;
  }

  .history-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 10px;
    font-size: 11px;
  }

  .history-date {
    color: var(--ink-soft);
  }

  .history-status {
    color: var(--ink-soft);
    text-align: right;
  }

  .history-status.good { color: var(--accent2); }
  .history-status.warn { color: var(--accent); }

  .goal-empty {
    color: var(--ink-soft);
    font-size: 12px;
    line-height: 1.45;
    padding: 8px 0 2px;
  }

  @media (min-width: 560px) {
    .goal-form {
      grid-template-columns: repeat(3, 1fr);
    }

    .kpi-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .daily-entry {
      grid-template-columns: 1fr 1fr auto;
    }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>Jamile <em>tarefas</em></h1>
      <div class="date-chip" id="date-label"></div>
    </div>
    <button class="btn-new-list" onclick="openNewListModal()">+ Lista</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="progress-text" id="prog-text">0 / 0</div>
  </div>
</div>

<!-- MAIN MENU -->
<div class="main-menu">
  <div class="main-menu-inner">
    <button class="main-tab active" id="tab-tasks" onclick="switchView('tasks')">Tarefas</button>
    <button class="main-tab" id="tab-weight" onclick="switchView('weight')">Meta peso</button>
  </div>
</div>

<!-- LISTS BAR -->
<div class="lists-bar" id="lists-bar"></div>

<!-- CONTENT -->
<div class="content">
  <div class="view active" id="tasks-view">
    <div class="add-form">
      <input type="text" id="task-input" placeholder="Nova tarefa..." onkeydown="if(event.key==='Enter') addTask()">
      <div class="add-form-row">
        <select class="cat-select" id="cat-select">
          <option value="casa">🏠 Casa</option>
          <option value="compras">🛒 Compras</option>
          <option value="estudos">📚 Estudos</option>
          <option value="pessoas">👥 Pessoas</option>
          <option value="tarefas">✅ Tarefas</option>
          <option value="laila">👧 Laila</option>
          <option value="outro">📌 Outro</option>
        </select>
        <button class="btn-add" onclick="addTask()">Adicionar</button>
      </div>
    </div>

    <div id="tasks-container"></div>
  </div>

  <div class="view" id="weight-view">
    <div class="goal-grid">
      <div class="goal-panel">
        <h2>Meta de peso</h2>
        <div class="goal-form">
          <div class="field">
            <label for="goal-target">Peso desejado</label>
            <input type="number" id="goal-target" min="0" step="0.1" inputmode="decimal" placeholder="Ex: 62">
          </div>
          <div class="field">
            <label for="goal-start">Peso inicial</label>
            <input type="number" id="goal-start" min="0" step="0.1" inputmode="decimal" placeholder="Ex: 82.5">
          </div>
          <div class="field">
            <label for="goal-date">Data da meta</label>
            <input type="date" id="goal-date">
          </div>
        </div>
        <div class="goal-actions">
          <button class="btn-cancel" onclick="resetWeightGoal()">Limpar</button>
          <button class="btn-save" onclick="saveWeightGoal()">Salvar meta</button>
        </div>
        <div class="kpi-grid" id="weight-kpis"></div>
      </div>

      <div class="goal-panel">
        <h2>Peso do dia</h2>
        <div class="daily-entry">
          <div class="field">
            <label for="weight-entry-date">Data</label>
            <input type="date" id="weight-entry-date">
          </div>
          <div class="field">
            <label for="weight-entry">Peso</label>
            <input type="number" id="weight-entry" min="0" step="0.1" inputmode="decimal" placeholder="Kg">
          </div>
          <button class="btn-add" onclick="addWeightEntry()">Lançar</button>
        </div>
        <div class="section-label">Histórico</div>
        <div id="weight-history"></div>
      </div>
    </div>
  </div>
</div>

<!-- FAB mobile hint (scroll to top on tap) -->
<button class="fab" onclick="document.getElementById('task-input').focus(); window.scrollTo({top:0,behavior:'smooth'})">+</button>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Editar tarefa</h3>
    <input type="text" id="edit-input" placeholder="Texto da tarefa">
    <select id="edit-cat">
      <option value="casa">🏠 Casa</option>
      <option value="compras">🛒 Compras</option>
      <option value="estudos">📚 Estudos</option>
      <option value="pessoas">👥 Pessoas</option>
      <option value="tarefas">✅ Tarefas</option>
      <option value="laila">👧 Laila</option>
      <option value="outro">📌 Outro</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- NEW LIST MODAL -->
<div class="nl-modal-overlay" id="nl-modal">
  <div class="modal">
    <h3>Nova lista</h3>
    <input type="text" id="nl-input" placeholder="Nome da lista..." onkeydown="if(event.key==='Enter') createList()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeNewListModal()">Cancelar</button>
      <button class="btn-save" onclick="createList()">Criar</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────
const STORAGE_KEY = 'tarefas_app_v2';

function load() {
  try { return normalizeState(JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState()); }
  catch { return defaultState(); }
}

function defaultState() {
  return {
    lists: [{ id: 'default', name: 'Geral' }],
    activeList: 'default',
    activeView: 'tasks',
    tasks: [],
    weightGoal: null,
    weightEntries: []
  };
}

function normalizeState(raw) {
  const base = defaultState();
  const weightGoal = normalizeWeightGoal(raw?.weightGoal);
  return {
    ...base,
    ...raw,
    lists: Array.isArray(raw?.lists) && raw.lists.length ? raw.lists : base.lists,
    activeList: raw?.activeList || base.activeList,
    activeView: raw?.activeView || base.activeView,
    tasks: Array.isArray(raw?.tasks) ? raw.tasks : [],
    weightGoal,
    weightEntries: Array.isArray(raw?.weightEntries) ? raw.weightEntries : []
  };
}

function normalizeWeightGoal(goal) {
  if (!goal) return null;
  if (goal.targetWeightKg) return goal;
  if (goal.startWeightKg && goal.lossKg) {
    return {
      startWeightKg: goal.startWeightKg,
      targetWeightKg: goal.startWeightKg - goal.lossKg,
      targetDate: goal.targetDate,
      startDate: goal.startDate
    };
  }
  return goal;
}

function save(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = load();
let editingId = null;

// ── UTILS ──────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function catLabel(c) {
  const m = { casa:'Casa', compras:'Compras', estudos:'Estudos', pessoas:'Pessoas', tarefas:'Tarefas', laila:'Laila', outro:'Outro' };
  return m[c] || c;
}

function todayIso() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 10);
}

function parseIsoDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function daysBetween(start, end) {
  const ms = parseIsoDate(end) - parseIsoDate(start);
  return Math.max(0, Math.round(ms / 86400000));
}

function grams(kg) {
  return Math.round(Math.abs(kg) * 1000);
}

function formatKg(n) {
  return `${Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 1, maximumFractionDigits: 1 })} kg`;
}

function formatGramsFromKg(n) {
  return `${grams(n).toLocaleString('pt-BR')} g`;
}

function dateLabel(iso) {
  return parseIsoDate(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

// ── RENDER ─────────────────────────────────────────────
function render() {
  renderView();
  renderListsBar();
  renderTasks();
  renderProgress();
  renderWeightGoal();
  document.getElementById('date-label').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
}

function renderView() {
  const isWeight = state.activeView === 'weight';
  document.getElementById('tasks-view').classList.toggle('active', !isWeight);
  document.getElementById('weight-view').classList.toggle('active', isWeight);
  document.getElementById('tab-tasks').classList.toggle('active', !isWeight);
  document.getElementById('tab-weight').classList.toggle('active', isWeight);
  document.getElementById('lists-bar').classList.toggle('hidden', isWeight);
  document.querySelector('.fab').classList.toggle('hidden', isWeight);
}

function renderListsBar() {
  const bar = document.getElementById('lists-bar');
  bar.innerHTML = '';
  state.lists.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'list-tab' + (l.id === state.activeList ? ' active' : '');
    btn.innerHTML = l.name + (l.id !== 'default' ? ` <span class="list-tab-del" onclick="deleteList(event,'${l.id}')">×</span>` : '');
    btn.onclick = (e) => { if(e.target.classList.contains('list-tab-del')) return; switchList(l.id); };
    bar.appendChild(btn);
  });
}

function renderTasks() {
  const container = document.getElementById('tasks-container');
  const tasks = state.tasks.filter(t => t.listId === state.activeList);

  if (tasks.length === 0) {
    container.innerHTML = '<div class="empty">Nenhuma tarefa ainda.<br>Adicione acima ↑</div>';
    return;
  }

  const cats = ['casa','compras','estudos','pessoas','tarefas','laila','outro'];
  let html = '';

  cats.forEach(cat => {
    const group = tasks.filter(t => t.cat === cat);
    if (!group.length) return;
    html += `<div class="section-label">${catLabel(cat)}</div><ul class="task-list">`;
    group.forEach(t => {
      html += `
        <li class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
          <div class="checkbox" onclick="toggleTask('${t.id}')"><div class="checkbox-dot"></div></div>
          <div class="task-body" onclick="toggleTask('${t.id}')">
            <div class="task-text">${escHtml(t.text)}</div>
            <span class="task-tag tag-${t.cat}">${catLabel(t.cat)}</span>
          </div>
          <div class="task-actions">
            <button class="btn-icon" onclick="openEditModal('${t.id}')" title="Editar">✎</button>
            <button class="btn-icon" onclick="deleteTask('${t.id}')" title="Excluir">✕</button>
          </div>
        </li>`;
    });
    html += '</ul>';
  });

  container.innerHTML = html;
}

function renderProgress() {
  const tasks = state.tasks.filter(t => t.listId === state.activeList);
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${done} / ${total}`;
}

function renderWeightGoal() {
  const goal = state.weightGoal;
  document.getElementById('goal-target').value = goal?.targetWeightKg ?? '';
  document.getElementById('goal-start').value = goal?.startWeightKg ?? '';
  document.getElementById('goal-date').value = goal?.targetDate ?? '';
  if (!document.getElementById('weight-entry-date').value) {
    document.getElementById('weight-entry-date').value = todayIso();
  }
  renderWeightKpis();
  renderWeightHistory();
}

function renderWeightKpis() {
  const box = document.getElementById('weight-kpis');
  const goal = state.weightGoal;
  if (!goal) {
    box.innerHTML = '<div class="goal-empty">Salve a meta para calcular a perda diária e acompanhar os lançamentos.</div>';
    return;
  }

  const summary = weightSummary(goal, todayIso());
  const statusClass = summary.hasEntry ? (Math.abs(summary.deltaKg) < 0.05 ? 'good' : (summary.deltaKg < 0 ? 'good' : 'warn')) : '';
  const statusText = summary.hasEntry
    ? goalStatusText(summary.deltaKg)
    : 'Sem peso hoje';
  const neededText = summary.hasEntry ? formatGramsFromKg(Math.max(0, summary.deltaKg)) : formatGramsFromKg(summary.dailyLossKg);

  box.innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Perda diária</div>
      <div class="kpi-value">${formatGramsFromKg(summary.dailyLossKg)}</div>
      <div class="kpi-note">${formatKg(summary.startWeightKg)} até ${formatKg(summary.targetWeightKg)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Dias restantes</div>
      <div class="kpi-value">${summary.remainingDays}</div>
      <div class="kpi-note">Data final: ${dateLabel(goal.targetDate)}</div>
    </div>
    <div class="kpi ${statusClass}">
      <div class="kpi-label">Ritmo de hoje</div>
      <div class="kpi-value">${statusText}</div>
      <div class="kpi-note">Peso alvo hoje: ${formatKg(summary.expectedWeightKg)}</div>
    </div>
    <div class="kpi ${summary.hasEntry ? (summary.deltaKg > 0 ? 'warn' : 'good') : ''}">
      <div class="kpi-label">Perder hoje</div>
      <div class="kpi-value">${neededText}</div>
      <div class="kpi-note">Peso desejado: ${formatKg(summary.targetWeightKg)} até ${dateLabel(goal.targetDate)}</div>
    </div>`;
}

function renderWeightHistory() {
  const box = document.getElementById('weight-history');
  const entries = [...state.weightEntries].sort((a, b) => b.date.localeCompare(a.date));
  if (!entries.length) {
    box.innerHTML = '<div class="empty">Nenhum peso lançado ainda.</div>';
    return;
  }

  box.innerHTML = `<ul class="history-list">${entries.map(e => {
    const summary = state.weightGoal ? weightSummary(state.weightGoal, e.date, e.weightKg) : null;
    const delta = summary ? e.weightKg - summary.expectedWeightKg : 0;
    const good = delta <= 0;
    const status = summary ? goalStatusText(delta) : '';
    return `
      <li class="history-item">
        <span class="history-date">${parseIsoDate(e.date).toLocaleDateString('pt-BR')}</span>
        <strong>${formatKg(e.weightKg)}</strong>
        <span class="history-status ${good ? 'good' : 'warn'}">${status}</span>
      </li>`;
  }).join('')}</ul>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function goalStatusText(deltaKg) {
  if (Math.abs(deltaKg) < 0.05) return 'Na meta';
  if (deltaKg < 0) return `${formatGramsFromKg(deltaKg)} abaixo`;
  return `${formatGramsFromKg(deltaKg)} acima`;
}

// ── ACTIONS ────────────────────────────────────────────
function addTask() {
  const input = document.getElementById('task-input');
  const cat = document.getElementById('cat-select').value;
  const text = input.value.trim();
  if (!text) return;
  state.tasks.push({ id: uid(), listId: state.activeList, text, cat, done: false });
  input.value = '';
  save(state);
  render();
}

function switchView(view) {
  state.activeView = view;
  save(state);
  render();
}

function toggleTask(id) {
  const t = state.tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(state); render(); }
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  save(state);
  render();
}

function openEditModal(id) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('edit-input').value = t.text;
  document.getElementById('edit-cat').value = t.cat;
  document.getElementById('edit-modal').classList.add('open');
  setTimeout(() => document.getElementById('edit-input').focus(), 100);
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingId = null;
}

function saveEdit() {
  const text = document.getElementById('edit-input').value.trim();
  const cat = document.getElementById('edit-cat').value;
  if (!text || !editingId) return;
  const t = state.tasks.find(t => t.id === editingId);
  if (t) { t.text = text; t.cat = cat; save(state); render(); }
  closeEditModal();
}

// ── LISTS ──────────────────────────────────────────────
function switchList(id) {
  state.activeList = id;
  save(state);
  render();
}

function openNewListModal() {
  document.getElementById('nl-modal').classList.add('open');
  setTimeout(() => document.getElementById('nl-input').focus(), 100);
}

function closeNewListModal() {
  document.getElementById('nl-modal').classList.remove('open');
  document.getElementById('nl-input').value = '';
}

function createList() {
  const name = document.getElementById('nl-input').value.trim();
  if (!name) return;
  const id = uid();
  state.lists.push({ id, name });
  state.activeList = id;
  save(state);
  closeNewListModal();
  render();
}

function deleteList(e, id) {
  e.stopPropagation();
  if (!confirm('Excluir esta lista e todas as suas tarefas?')) return;
  state.lists = state.lists.filter(l => l.id !== id);
  state.tasks = state.tasks.filter(t => t.listId !== id);
  if (state.activeList === id) state.activeList = state.lists[0]?.id || 'default';
  save(state);
  render();
}

// ── WEIGHT GOAL ────────────────────────────────────────
function saveWeightGoal() {
  const targetWeightKg = Number(document.getElementById('goal-target').value.replace(',', '.'));
  const startWeightKg = Number(document.getElementById('goal-start').value.replace(',', '.'));
  const targetDate = document.getElementById('goal-date').value;
  if (!targetWeightKg || !startWeightKg || !targetDate || targetWeightKg >= startWeightKg) return;

  const startDate = state.weightGoal?.startDate || todayIso();
  state.weightGoal = { targetWeightKg, startWeightKg, targetDate, startDate };
  save(state);
  render();
}

function resetWeightGoal() {
  if (!confirm('Limpar a meta e o histórico de pesos?')) return;
  state.weightGoal = null;
  state.weightEntries = [];
  save(state);
  render();
}

function addWeightEntry() {
  const date = document.getElementById('weight-entry-date').value || todayIso();
  const weightKg = Number(document.getElementById('weight-entry').value.replace(',', '.'));
  if (!date || !weightKg) return;

  const existing = state.weightEntries.find(e => e.date === date);
  if (existing) existing.weightKg = weightKg;
  else state.weightEntries.push({ date, weightKg });

  document.getElementById('weight-entry').value = '';
  save(state);
  render();
}

function weightSummary(goal, date, explicitWeight) {
  const totalDays = Math.max(1, daysBetween(goal.startDate, goal.targetDate));
  const elapsedDays = Math.min(totalDays, daysBetween(goal.startDate, date));
  const remainingDays = Math.max(0, daysBetween(date, goal.targetDate));
  const targetWeightKg = goal.targetWeightKg ?? (goal.startWeightKg - goal.lossKg);
  const totalLossKg = Math.max(0, goal.startWeightKg - targetWeightKg);
  const dailyLossKg = totalLossKg / totalDays;
  const expectedWeightKg = Math.max(targetWeightKg, goal.startWeightKg - (dailyLossKg * elapsedDays));
  const entry = state.weightEntries.find(e => e.date === date);
  const currentWeightKg = explicitWeight ?? entry?.weightKg ?? null;

  return {
    totalDays,
    remainingDays,
    totalLossKg,
    startWeightKg: goal.startWeightKg,
    dailyLossKg,
    targetWeightKg,
    expectedWeightKg,
    currentWeightKg,
    hasEntry: currentWeightKg !== null,
    deltaKg: currentWeightKg === null ? 0 : currentWeightKg - expectedWeightKg
  };
}

// Close modals on overlay click
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});
document.getElementById('nl-modal').addEventListener('click', function(e) {
  if (e.target === this) closeNewListModal();
});

// ── INIT ───────────────────────────────────────────────
render();
</script>
